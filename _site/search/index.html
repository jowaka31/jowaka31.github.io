<script>
document.addEventListener('DOMContentLoaded', function() {
    // 네비게이션 토글 기능
    document.querySelectorAll('.toggle-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            const icon = this.querySelector('i');
            icon.classList.toggle('rotated');
            const content = this.closest('.nav-section').querySelector('.nav-section-content');
            content.classList.toggle('collapsed');
            const sectionId = this.closest('.nav-section').querySelector('h3').textContent;
            localStorage.setItem('nav-section-' + sectionId, content.classList.contains('collapsed') ? 'closed' : 'open');
        });
    });

    // 모든 섹션을 기본적으로 열어둡니다
    document.querySelectorAll('.nav-section').forEach(function(section) {
        const content = section.querySelector('.nav-section-content');
        const icon = section.querySelector('.toggle-btn i');
        content.classList.remove('collapsed');
        icon.classList.add('rotated');
    });
});
</script>

                "title": "Life",
                "content": "1998.07 - 1999.06  [부산-영도구]에서 태어났다.  이후 [서울-강동구]로 이동했다.          특별한 기억은 없다.      1999.06 - 2003.02  [서울-강동구]에서 [경기-광주]로 이동했다.          경기-광주부터는 기억이 있다.      2003.02 - 2005.03  한솔유치원을 다녔다.          종이 비행기를 잘 만들었던 기억이 있다.      2005.03 - 2011.03  [태전초등학교]를 다녔다.          시끄럽고 호전적인 아이였다.      스포츠도 좋아하고 싸움도 꽤나 잘했던 것으로 기억한다.      무리지어 다니는 것을 좋아하지는 않았지만, 같이 놀거리가 있으면 잘 어울려 다녔다.      조금 이기적인 성향이 있었지만 그 나이에 맞는 아이였던 것 같다.      2011.03 - 2014.03  [광남중학교]를 다녔다.          조금 더 조용해졌고, 이기적인 성향도 좀 줄어든 것으로 기억한다.      스포츠, PC방, 노래방 등 다양한 활동을 했다.      무언가에 엄청난 열정을 쏟았던 기억은 없지만 공부는 괜찮게 했다.      2014.03 - 2017.03  기숙사 생활을 하여, [경기-광주]에서 [경북-김천]으로 이동했다.  [김천고등학교]를 다녔다.          많은 스트레스를 받았다. (대입 압박감, 기숙사 생활, 사회와 단절된 기분 등등…)      하지만 그만큼 즐거운 추억도 많은 경험이었다.      멋진 친구들을 많이 알게되었다.      이 시기에 삶에 대한 태도가 어느정도 정립이 된 것 같다.      2017.03 - 2021.03  [광운대학교-전자바이오물리학과]를 다녔다.          풍물 동아리에서 활동을 했다.                  다양한 사람들을 만나며 교류했다.          이 때의 경험으로 어떤 상황에서도 크게 불편함을 느끼지 않는 것 같다.                    물리학에 큰 흥미와 열정을 가지고 공부했다.                  이후 이 자산을 바탕으로 [광운대학교-전자공학과-전과]과 [서울시립대-물리학과-편입]을 성공했다.          최종적으로 [서울시립대-물리학과-편입]을 선택했다.                    2018.09 - 2020.04  [육군]에서 복무한다.          원래도 일찍자고 일찍 일어나는 것을 선호했지만 이때 생활습관이 완전 정착되었다.      특급전사를 취득하고 웨이트 트레이닝에 흥미를 붙였다.      다양한 삶의 방식을 보며 앞으로 어떻게 살 것인가 고민했다.      편입을 위한 공부를 했다.      2021.03 - 2023.08  [서울시립대학교-물리학과]를 다녔다.          물리학과 연구실에서 처음 데이터 사이언스를 접한다.                  이걸 하면서 살고 싶다는 생각을 했다.          혼자서 많은 것들을 할 수 있는 기술이라고 생각했다.                    통계학과를 복수전공 한다.      2021.07 - 2022.03  [서울시립대-물리학과-2차원물질연구소]를 다녔다.          프로그래밍과 데이터 엔지니어링에 입문한다.      나와 잘 맞는다고 느꼈다. 좋은 코드가 잘 풀어낸 물리 답안지와 비슷하다고 느꼈다.      2022.06  ADsP 데이터분석 준전문가 자격증을 취득한다.  SQLD SQL 개발자 자격증을 취득한다.2022.08  TOEIC 915를 취득한다.2022.09 - 2023.03  [SK-Planet T-Academy 빅데이터 분석가 1기] 과정을 다녔다.          혼자서만 작업을 하다가 한번 쯤 커리큘럼을 쭉 듣는 것이 좋을 것 같아서 이수했다.      기업연계프로젝트에서 많이 배웠다.      2022.12  빅데이터 분석기사 자격증을 취득한다.2023.01 - 2023.06  [달리셔스]를 다녔다.          데이터 웨어하우스를 구축하는 경험      백엔드를 공부하고 구현하는 경험      ML 모델 배포 및 백오피스를 구현하는 경험      실사용 유저가 있는 프로그램을 개발하는 경험      등등 정말 많이 배웠다.        [SK-Planet T-Academy 빅데이터 분석가 1기]의 [기업연계프로젝트-우수상]을 수상했다.2023.07 - 2023.11  [한국거래소 제2회 알고리즘 주식투자 경진대회]에서 [장려상 / 한국거래소 이사장 표창장]를 수상한다.          처음으로 수상한 어느정도 네이밍이 있는 대회      알고리즘 트레이딩에 왕도가 없기에 내가 생각하는 논리를 집중해서 구현하는 경험을 할 수 있었다.      처음으로 python library를 구축 배포했다.      처음으로 open-source에 기여했다.      2024.02 - 2024.05  [IBM Professional Data-Science] 과정을 이수한다.  [IBM Professional Data-Engineer] 과정을 이수한다.2024.03  OPIC - IH를 취득한다.2024.04 - 2024.07  [ELICE]에서 AI부분의 강의를 진행한다.          컴퓨터 구조와 리눅스, 도커와 네트워크, python과 데이터 강의를 진행했다.      스스로 부족한 부분을 명확히 이해하고 내가 아는 것을 명확하게 전달하는 능력을 배운 것 같다.      즐거운 경험이었다.      2024.05 - 2024.08  [2024 날씨 빅데이터 콘테스트]에서 [최우수상 / 환경부장관상]을 수상한다.          백엔드, 임베디드 개발자와 기상 연구원과 팀을 이뤄 나간 대회                  각 개발자의 특성에 따른 코드를 보는 것이 인상적이었다.          사회에서 통하는 보고서의 수준에 굉장히 놀랐다.                    2024.07  TOEIC 910을 취득한다.2024.07 - 2024.09  [농넷 활용사례 수기공모전]에서 [소비부문 / 장려상]을 수상한다.          기상청 대회 수상후 가볍게 사이드로 진행했다.      대회 때 고민한 아이디어 중 하나를 간단히 정리하여 제출하고 수상했다.      2024.10 - 2024.11  [데이터-AI를 활용한 물가 예측 경진대회]에서 [우수상 / 한국인공지능학회장상]을 수상한다.          도매시장, 소매시장, 기상, 해외 수출입 등 다양한 데이터를 바탕으로 여러가지 농산물 가격을 예측하는 대회.      시계열 데이터를 다루는 것을 좋아하는 만큼 즐겁게 작업했다.      본선에서는 [2024-대한민국-정부박람회]에서 직접 모델 논리를 발표하는 경험을 했다.                  처음 간 광주의 음식은 맛있었다.                    2025.01  IETLS 7.0을 취득한다.2025.05  [University of New South Wales]와 [Univerity of Queensland] 대학교 데이터 사이언스 석사과정에 합격한다.          [University of New South Wales] 진학을 결정한다.      ",
                "url": "/1998/07/31/life/",
                "date": "1998년 07월 31일",
                "category": ""
            }

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 목차 생성
            const headings = document.querySelectorAll('.post-content h1, .post-content h2, .post-content h3, .page-content h1, .page-content h2, .page-content h3');
            const toc = document.querySelector('#toc');
            if (toc && headings.length > 0) {
                const tocList = document.createElement('ul');
                tocList.className = 'toc-list';
                
                // 최소 헤딩 레벨 찾기
                let minLevel = 6;
                headings.forEach(heading => {
                    const level = parseInt(heading.tagName.charAt(1));
                    minLevel = Math.min(minLevel, level);
                });
                
                // 목차 생성
                headings.forEach((heading, index) => {
                    heading.id = heading.id || `heading-${index}`;
                    const level = parseInt(heading.tagName.charAt(1));
                    const relativeLevel = level - minLevel + 1;
                    
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = `#${heading.id}`;
                    a.textContent = heading.textContent;
                    a.className = `toc-h${relativeLevel}`;
                    
                    a.addEventListener('click', (e) => {
                        e.preventDefault();
                        heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    });
                    
                    li.appendChild(a);
                    tocList.appendChild(li);
                });
                
                toc.appendChild(tocList);

                // 스크롤 이벤트로 현재 섹션 하이라이트
                window.addEventListener('scroll', () => {
                    const scrollPosition = window.scrollY;
                    
                    headings.forEach((heading, index) => {
                        const link = tocList.querySelector(`a[href="#${heading.id}"]`);
                        if (!link) return;
                        
                        const nextHeading = headings[index + 1];
                        const isActive = 
                            scrollPosition >= heading.offsetTop - 100 && 
                            (!nextHeading || scrollPosition < nextHeading.offsetTop - 100);
                        
                        link.classList.toggle('active', isActive);
                    });
                });
            }
        });
    </script>
