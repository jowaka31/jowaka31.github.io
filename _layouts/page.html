---
layout: default
---

<article class="page">
    <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
    </header>

    <div class="page-content">
        {% if page.toc %}
        <aside class="toc">
            <h2>목차</h2>
            {% include toc.html html=content %}
        </aside>
        {% endif %}
        {{ content }}
    </div>
</article>
